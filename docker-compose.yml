version: '3.8'

services:
  # ==========================================
  # DATABASES & INFRASTRUCTURE
  # ==========================================
  postgres-users:
    image: postgres:15-alpine
    container_name: postgres_users
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: users_db
    ports:
      - "5432:5432"
    volumes:
      - pg_users_data:/var/lib/postgresql/data
    networks:
      - medical_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d users_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-appointments:
    image: postgres:15-alpine
    container_name: postgres_appointments
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: appointments_db
    ports:
      - "5433:5432" # Expuesto en 5433 en host
    volumes:
      - pg_appointments_data:/var/lib/postgresql/data
    networks:
      - medical_network

  mongodb:
    image: mongo:7
    container_name: mongodb_doctors
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - medical_network

  redis:
    image: redis:7-alpine
    container_name: redis_queue
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - medical_network

  # ==========================================
  # MICROSERVICES
  # ==========================================

  # API Gateway (Podría ser Nginx también, o NestJS como en el diseño)
  # api-gateway:
  #   build: ./api-gateway
  #   ports:
  #     - "3000:3000"
  #   networks:
  #     - medical_network
  #   depends_on:
  #     - ms-auth
  #     - ms-doctor
  #     - ms-appointment

  ms-auth:
    build: ./ms-auth
    container_name: ms_auth
    ports:
      - "3001:3001"
    environment:
      - DB_HOST=postgres-users
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgrespassword
      - DB_NAME=users_db
    depends_on:
      postgres-users:
        condition: service_healthy
    networks:
      - medical_network

  ms-doctor:
    build: ./ms-doctor
    container_name: ms_doctor
    ports:
      - "3002:3002"
    environment:
      - MONGODB_URI=mongodb://root:rootpassword@mongodb:27017/doctors_db?authSource=admin
      - MS_AUTH_URL=http://ms-auth:3001
      - MS_APPOINTMENT_URL=http://ms-appointment:3003
    depends_on:
      - mongodb
    networks:
      - medical_network

  ms-appointment:
    build: ./ms-appointment
    container_name: ms_appointment
    ports:
      - "3003:3003"
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@postgres-appointments:5432/appointments_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres-appointments
      - redis
    networks:
      - medical_network

  ms-notification:
    build: ./ms-notification
    container_name: ms_notification
    ports:
      - "3004:3004"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - medical_network

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:3000"
    environment:
      # These point to localhost:* because browser requests come from the host machine
      # (the microservice ports are already exposed to the host via docker-compose ports mapping)
      - NEXT_PUBLIC_AUTH_URL=http://localhost:3001
      - NEXT_PUBLIC_DOCTOR_URL=http://localhost:3002
      - NEXT_PUBLIC_APPOINTMENT_URL=http://localhost:3003
    depends_on:
      - ms-auth
      - ms-doctor
      - ms-appointment
    networks:
      - medical_network

networks:
  medical_network:
    driver: bridge

volumes:
  pg_users_data:
  pg_appointments_data:
  mongo_data:
  redis_data:

