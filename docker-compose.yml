services:
  # ==========================================
  # DATABASES & INFRASTRUCTURE
  # ==========================================
  postgres-users:
    image: postgres:15-alpine
    container_name: postgres_users
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: users_db
    ports:
      - "5432:5432"
    volumes:
      - pg_users_data:/var/lib/postgresql/data
    networks:
      - medical_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d users_db" ]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-appointments:
    image: postgres:15-alpine
    container_name: postgres_appointments
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: appointments_db
    ports:
      - "5433:5432" # Expuesto en 5433 en host
    volumes:
      - pg_appointments_data:/var/lib/postgresql/data
    networks:
      - medical_network

  mongodb:
    image: mongo:7
    container_name: mongodb_doctors
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - medical_network

  redis:
    image: redis:7-alpine
    container_name: redis_queue
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - medical_network

  # ==========================================
  # MICROSERVICES
  # ==========================================

  ms-eureka:
    build: ./ms-eureka
    container_name: ms_eureka
    ports:
      - "8761:8761"
    networks:
      - medical_network
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8761/eureka/apps || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  ms-gateway:
    build: ./ms-gateway
    container_name: ms_gateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA_URL=http://ms-eureka:8761/eureka/
    depends_on:
      ms-eureka:
        condition: service_healthy
    networks:
      - medical_network

  ms-auth:
    build: ./ms-auth
    container_name: ms_auth
    ports:
      - "3001:3001"
    environment:
      - DB_HOST=postgres-users
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgrespassword
      - DB_NAME=users_db
      - EUREKA_HOST=ms-eureka
      - EUREKA_PORT=8761
    depends_on:
      postgres-users:
        condition: service_healthy
      ms-eureka:
        condition: service_healthy
    networks:
      - medical_network

  ms-doctor:
    build: ./ms-doctor
    container_name: ms_doctor
    ports:
      - "3002:3002"
    environment:
      - MONGODB_URI=mongodb://root:rootpassword@mongodb:27017/doctors_db?authSource=admin
      - MS_AUTH_URL=http://ms-auth:3001
      - MS_APPOINTMENT_URL=http://ms-appointment:3003
      - EUREKA_URL=http://ms-eureka:8761/eureka/
    depends_on:
      mongodb:
        condition: service_started
      ms-eureka:
        condition: service_healthy
    networks:
      - medical_network

  ms-appointment:
    build: ./ms-appointment
    container_name: ms_appointment
    ports:
      - "3003:3003"
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@postgres-appointments:5432/appointments_db
      - REDIS_URL=redis://redis:6379/0
      - EUREKA_SERVER=http://ms-eureka:8761/eureka
    depends_on:
      postgres-appointments:
        condition: service_started
      redis:
        condition: service_started
      ms-eureka:
        condition: service_healthy
    networks:
      - medical_network

  ms-notification:
    build: ./ms-notification
    container_name: ms_notification
    ports:
      - "3004:3004"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - EUREKA_SERVER=http://ms-eureka:8761/eureka
    depends_on:
      redis:
        condition: service_started
      ms-eureka:
        condition: service_healthy
    networks:
      - medical_network

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:3000"
    environment:
      # These point to localhost:* because browser requests come from the host machine
      # (the microservice ports are already exposed to the host via docker-compose ports mapping)
      - NEXT_PUBLIC_AUTH_URL=http://localhost:8080/auth
      - NEXT_PUBLIC_DOCTOR_URL=http://localhost:8080/doctor
      - NEXT_PUBLIC_APPOINTMENT_URL=http://localhost:8080/appointment
    depends_on:
      - ms-gateway
    networks:
      - medical_network

networks:
  medical_network:
    driver: bridge

volumes:
  pg_users_data:
  pg_appointments_data:
  mongo_data:
  redis_data:


